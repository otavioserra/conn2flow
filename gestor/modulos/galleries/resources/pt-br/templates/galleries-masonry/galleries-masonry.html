<section class="font-sans p-6" data-id="1" data-title="gallery-masonry" style="margin-left: @[[margin_lateral]]@px; margin-right: @[[margin_lateral]]@px;">
    <div class="columns-2 sm:columns-3 lg:columns-4 gap-4">
        <!-- item < -->
        <figure class="mb-4 break-inside-avoid overflow-hidden rounded-lg shadow-sm">
            <a href="@[[item#link-url]]@" target="@[[item#link-target]]@" class="block @[[item#link-css-classes]]@">
                <img src="@[[item#img-src]]@" alt="@[[item#nome]]@" title="@[[item#nome]]@" class="w-full rounded-lg">
            </a>
            <figcaption class="text-sm text-gray-600 mt-2 px-3 pb-2">@[[item#legenda]]@</figcaption>
        </figure>
        <!-- item > -->
        <!-- no-item < -->
        <div class="text-center text-gray-400 italic py-10">Nenhuma imagem na galeria</div>
        <!-- no-item > -->
    </div>
</section>
