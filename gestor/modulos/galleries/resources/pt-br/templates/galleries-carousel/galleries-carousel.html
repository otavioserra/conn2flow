<section class="conn2flow-gallery font-sans p-6" data-id="1" data-title="gallery-carousel" data-autoplay="@[[autoplay]]@" data-speed="@[[autoplay_speed]]@" data-loop="@[[loop]]@">
    <style>.conn2flow-gallery .gallery-dot-active{background-color:#2563eb;}</style>
    <div class="relative">
        <div class="gallery-slides-wrapper flex gap-4 overflow-x-auto snap-x snap-mandatory pb-4 scroll-smooth">
            <!-- item < -->
            <figure class="gallery-slide snap-center shrink-0 w-80">
                <img src="@[[item#img-src]]@" alt="@[[item#nome]]@" title="@[[item#nome]]@"
                    class="w-80 h-56 object-cover rounded-lg shadow">
                <figcaption class="mt-2 text-sm text-gray-600 text-center">@[[item#legenda]]@</figcaption>
            </figure>
            <!-- item > -->
            <!-- no-item < -->
            <div class="w-full text-center text-gray-400 italic py-10">Nenhuma imagem na galeria</div>
            <!-- no-item > -->
        </div>
        <!-- controls-arrows < -->
        <button type="button" class="gallery-prev absolute left-2 top-1/2 -translate-y-1/2 bg-white/80 hover:bg-white text-gray-800 rounded-full w-10 h-10 shadow flex items-center justify-center text-xl" aria-label="Anterior">&#8249;</button>
        <button type="button" class="gallery-next absolute right-2 top-1/2 -translate-y-1/2 bg-white/80 hover:bg-white text-gray-800 rounded-full w-10 h-10 shadow flex items-center justify-center text-xl" aria-label="Próximo">&#8250;</button>
        <!-- controls-arrows > -->
        <!-- controls-dots < -->
        <div class="gallery-dots flex justify-center gap-2 mt-3">
            <!-- dot-item < -->
            <button type="button" class="gallery-dot w-2.5 h-2.5 rounded-full bg-gray-300 transition-colors @[[dot#active-class]]@" data-index="@[[dot#index]]@" aria-label="Ir para o slide @[[dot#index]]@"></button>
            <!-- dot-item > -->
        </div>
        <!-- controls-dots > -->
    </div>
</section>
