<section class="conn2flow-publisher-index font-sans max-w-3xl mx-auto p-4" data-grupo-slug="@[[grupo_slug]]@" data-publisher-id="@[[publisher_id]]@" data-items-per-page="@[[items_per_page]]@" data-ordenacao="@[[ordenacao]]@" data-page="1">
    <div class="flex flex-col sm:flex-row gap-3 mb-6">
        <!-- search-input < -->
        <div class="flex-1">
            <input type="search" class="publisher-index-search w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Search publications...">
        </div>
        <!-- search-input > -->
        <!-- sort-select < -->
        <div>
            <select class="publisher-index-sort w-full sm:w-auto border border-gray-300 rounded-lg px-4 py-2 bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <option value="date_desc">Newest first</option>
                <option value="date_asc">Oldest first</option>
                <option value="title_asc">Title (A-Z)</option>
                <option value="title_desc">Title (Z-A)</option>
            </select>
        </div>
        <!-- sort-select > -->
    </div>

    <!-- metrics < -->
    <div class="publisher-index-metrics text-sm text-gray-500 mb-4">Showing <span data-page-count>@[[page_count]]@</span> of <span data-page-total>@[[page_total]]@</span></div>
    <!-- metrics > -->

    <div class="publisher-index-items flex flex-col">
        <!-- item < -->
        <a href="@[[item#url]]@" class="flex gap-4 group">
            <div class="flex flex-col items-center">
                <span class="w-3 h-3 rounded-full bg-indigo-500 mt-1.5 shrink-0 group-hover:scale-125 transition-transform"></span>
                <span class="w-px flex-1 bg-indigo-200"></span>
            </div>
            <div class="pb-6">
                <time class="text-xs font-semibold uppercase tracking-wide text-indigo-500">@[[item#data]]@</time>
                <h3 class="text-lg font-semibold text-gray-900 leading-snug group-hover:text-indigo-600 transition-colors">@[[item#titulo]]@</h3>
            </div>
        </a>
        <!-- item > -->
        <!-- no-item < -->
        <div class="publisher-index-empty text-center text-gray-500 py-10">No publications found.</div>
        <!-- no-item > -->
    </div>

    <div class="text-center mt-2">
        <!-- load-more < -->
        <button type="button" class="publisher-index-load-more inline-flex items-center gap-2 px-6 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-colors">
            Load more
        </button>
        <!-- load-more > -->
    </div>
</section>
