<style>
    html,
    body {
        background: transparent !important;
        margin: 0;
        padding: 0;
    }
    /* Forces the dropdown box visible via JS (hover-intent), regardless of CSS :hover — beats
       Tailwind's `hidden` during the close delay (see dashboard.iframe-toolbar.js). */
    .c2f-dropdown-force-open {
        display: block !important;
    }
</style>
<div id="c2f-toolbar-root" data-page-id="#page_id#" class="w-full font-sans select-none text-slate-100 text-sm">
    <!-- Main bar (30px) -->
    <div style="height:30px" class="w-full bg-slate-800 flex items-stretch">
        <!-- Brand / panel access -->
        <a href="@[[pagina#url-raiz]]@dashboard/" target="_parent"
            class="flex items-center gap-2 px-3 hover:bg-slate-700 transition-colors whitespace-nowrap">
            <img src="@[[pagina#url-raiz]]@images/LogomarcaIcone.png" alt="Dashboard" class="h-4 w-4 object-contain">
            <span class="sm:inline font-semibold">Dashboard</span>
        </a>

        <!-- Modules menu (populated by the controller) -->
        <div class="flex items-stretch">
            <!-- menu -->
        </div>

        <!-- Page actions (right side): Page and User dropdowns (BATCH-081) -->
        <div class="ml-auto flex items-stretch">
            <!-- Page dropdown -->
            <!-- dropdown-page < -->
            <div id="c2f-page-dropdown" class="relative group flex items-stretch">
                <button type="button" id="c2f-page-dropdown-btn"
                    class="flex items-center gap-2 px-3 hover:bg-slate-700 transition-colors whitespace-nowrap">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                    <span class="sm:inline">Page</span>
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                    </svg>
                </button>
                <div class="c2f-dropdown-menu absolute right-0 top-full w-64 bg-white border border-slate-200 rounded-b-md shadow-lg py-1 hidden group-hover:block z-20 text-slate-700">
                    <div class="px-4 pt-2 pb-1 text-[11px] font-semibold uppercase tracking-wide text-slate-400 whitespace-nowrap overflow-hidden text-ellipsis" title="#page_title#">#page_title#</div>
                    <button type="button" id="c2f-toolbar-edit"
                        class="w-full text-left flex items-center gap-2 px-4 py-2 hover:bg-slate-100 transition-colors whitespace-nowrap">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                        </svg>
                        <span>Edit Page</span>
                    </button>
                    <a href="#advanced_edit_url#" id="c2f-toolbar-edit-advanced" target="_parent"
                        class="flex items-center gap-2 px-4 py-2 hover:bg-slate-100 transition-colors whitespace-nowrap">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                        <span>Advanced Edit</span>
                    </a>
                    <a href="#new_page_url#" target="_parent"
                        class="flex items-center gap-2 px-4 py-2 hover:bg-slate-100 transition-colors whitespace-nowrap">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                        </svg>
                        <span>Create New Page</span>
                    </a>
                    <a href="#clone_page_url#" target="_parent"
                        class="flex items-center gap-2 px-4 py-2 hover:bg-slate-100 transition-colors whitespace-nowrap">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                        </svg>
                        <span>Clone Page</span>
                    </a>
                </div>
            </div>
            <!-- dropdown-page > -->

            <!-- User dropdown -->
            <div id="c2f-user-dropdown" class="relative group flex items-stretch">
                <button type="button" id="c2f-user-dropdown-btn"
                    class="flex items-center gap-2 px-3 hover:bg-slate-700 transition-colors whitespace-nowrap">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                    <span class="sm:inline">@[[usuario#nome]]@</span>
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                    </svg>
                </button>
                <div class="c2f-dropdown-menu absolute right-0 top-full w-64 bg-white border border-slate-200 rounded-b-md shadow-lg py-1 hidden group-hover:block z-20 text-slate-700">
                    <div class="flex items-center gap-3 px-4 py-3 border-b border-slate-100">
                        <svg class="w-8 h-8 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                        <span class="font-semibold whitespace-nowrap overflow-hidden text-ellipsis">@[[usuario#nome]]@</span>
                    </div>
                    <a href="@[[pagina#url-raiz]]@perfil-usuario/" target="_parent"
                        class="flex items-center gap-2 px-4 py-2 hover:bg-slate-100 transition-colors whitespace-nowrap">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                        <span>Profile</span>
                    </a>
                    <a href="@[[pagina#url-raiz]]@signout/" target="_parent"
                        class="flex items-center gap-2 px-4 py-2 hover:bg-slate-100 transition-colors whitespace-nowrap">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                        </svg>
                        <span>Sign out</span>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit bar (hidden; appears below when "Edit Page" is clicked) -->
    <div id="c2f-toolbar-editbar" style="display:none;height:44px"
        class="w-full bg-slate-700 items-center gap-2 px-3 border-t border-slate-600">
        <span class="text-slate-200 whitespace-nowrap hidden md:inline">Edit mode</span>
        <button type="button"
            class="screenPagina active blue flex items-center px-2 py-1 rounded bg-slate-600 hover:bg-slate-500 transition-colors"
            data-width="100%" title="Desktop">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
            </svg>
        </button>
        <button type="button"
            class="screenPagina flex items-center px-2 py-1 rounded bg-slate-600 hover:bg-slate-500 transition-colors"
            data-width="768px" title="Tablet">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <rect x="5" y="3" width="14" height="18" rx="2" stroke-width="2" />
                <circle cx="12" cy="18" r="0.6" fill="currentColor" stroke="none" />
            </svg>
        </button>
        <button type="button"
            class="screenPagina flex items-center px-2 py-1 rounded bg-slate-600 hover:bg-slate-500 transition-colors"
            data-width="375px" title="Mobile">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <rect x="7" y="2" width="10" height="20" rx="2" stroke-width="2" />
                <circle cx="12" cy="18" r="0.6" fill="currentColor" stroke="none" />
            </svg>
        </button>
        <button type="button" id="html-editor-undo-btn" title="Undo"
            class="flex items-center px-2 py-1 rounded bg-slate-600 hover:bg-slate-500 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 10h10a4 4 0 010 8h-1M3 10l4-4M3 10l4 4" />
            </svg>
        </button>
        <button type="button" id="html-editor-redo-btn" title="Redo"
            class="flex items-center px-2 py-1 rounded bg-slate-600 hover:bg-slate-500 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M21 10H11a4 4 0 000 8h1M21 10l-4-4M21 10l-4 4" />
            </svg>
        </button>
        <button type="button" id="html-editor-add-btn" title="Add element or widget"
            class="flex items-center gap-1 px-2 py-1 rounded bg-slate-600 hover:bg-slate-500 transition-colors text-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
            <span class="hidden sm:inline">Add</span>
        </button>
        <button type="button" id="c2f-backups-btn" title="Restore content backup"
            class="flex items-center gap-1 px-2 py-1 rounded bg-slate-600 hover:bg-slate-500 transition-colors text-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 3v5h5M3.05 13A9 9 0 106 5.3L3 8m9-1v5l3 2" />
            </svg>
            <span class="hidden sm:inline">Backups</span>
        </button>
        <button type="button" id="c2f-templates-btn" title="Section templates"
            class="flex items-center gap-1 px-2 py-1 rounded bg-slate-600 hover:bg-slate-500 transition-colors text-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 5a1 1 0 011-1h5v6H4V5zm10-1h5a1 1 0 011 1v4h-6V4zm0 8h6v7a1 1 0 01-1 1h-5v-8zM4 13h6v7H5a1 1 0 01-1-1v-6z" />
            </svg>
            <span class="hidden sm:inline">Templates</span>
        </button>
        <button type="button" id="c2f-ai-btn" title="AI Assistant"
            class="flex items-center gap-1 px-2 py-1 rounded bg-slate-600 hover:bg-slate-500 transition-colors text-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3l1.8 4.5L18.3 9.3l-4.5 1.8L12 15.6l-1.8-4.5L5.7 9.3l4.5-1.8L12 3zM18.5 14.5l.7 1.8 1.8.7-1.8.7-.7 1.8-.7-1.8-1.8-.7 1.8-.7z" />
            </svg>
            <span class="hidden sm:inline">AI Assistant</span>
        </button>
        <span class="mr-auto"></span>
        <button type="button" id="c2f-editbar-save"
            class="flex items-center gap-2 px-3 py-1 rounded bg-green-600 hover:bg-green-500 transition-colors whitespace-nowrap">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
            </svg>
            Save changes
        </button>
        <button type="button" id="c2f-editbar-cancel"
            class="flex items-center gap-2 px-3 py-1 rounded bg-slate-600 hover:bg-slate-500 transition-colors whitespace-nowrap">
            Exit
        </button>
    </div>
</div>
