<!-- menu-visible < -->
<section class="font-sans" data-id="1" data-title="menu-mobile-hamburguer">
    <nav class="bg-white border-b border-gray-200">
        <div class="relative px-4 py-3 flex items-center justify-between">
            <span class="font-semibold text-gray-800">Menu</span>
            <button type="button" class="menu-mobile-btn cursor-pointer text-gray-700" aria-label="Abrir menu" aria-expanded="false">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
            <ul class="menu-mobile-list hidden flex-col absolute left-0 right-0 top-full bg-white border-t border-gray-200 shadow-md z-10">
                <!-- item < -->
                <li class="border-b border-gray-100">
                    <a href="@[[item#url]]@" target="@[[item#target]]@" data-slug="@[[item#slug]]@" class="block px-4 py-3 text-gray-700 hover:bg-blue-50 hover:text-blue-700 transition-colors @[[item#css_classes]]@">@[[item#label]]@</a>
                </li>
                <!-- item > -->
                <!-- item-parent < -->
                <li class="border-b border-gray-100">
                    <span data-slug="@[[item#slug]]@" class="block px-4 py-3 font-semibold text-gray-800 @[[item#css_classes]]@">@[[item#label]]@</span>
                    <ul class="bg-gray-50 pl-4">
                        @[[item#children]]@
                    </ul>
                </li>
                <!-- item-parent > -->
                <!-- item-separator < -->
                <li class="border-b border-gray-100 bg-gray-50">
                    <div class="px-4 py-2 text-xs font-semibold text-gray-400 uppercase tracking-wide">@[[item#label]]@</div>
                </li>
                <!-- item-separator > -->
                <!-- no-item < -->
                <li class="px-4 py-3 text-gray-400 italic">Nenhum item no menu</li>
                <!-- no-item > -->
            </ul>
        </div>
    </nav>
</section>
<!-- menu-visible > -->
