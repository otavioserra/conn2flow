<section class="font-sans p-4" data-id="1" data-title="menu-breadcrumb">
    <nav class="text-sm" aria-label="Breadcrumb">
        <ol class="flex flex-wrap items-center gap-2 text-gray-500">
            <!-- item < -->
            <li class="flex items-center gap-2">
                <a href="@[[item#url]]@" data-slug="@[[item#slug]]@" class="hover:text-blue-600 transition-colors @[[item#css_classes]]@">@[[item#label]]@</a>
                <span class="text-gray-300">/</span>
            </li>
            <!-- item > -->
            <!-- item-parent < -->
            <li class="flex items-center gap-2">
                <a href="@[[item#url]]@" data-slug="@[[item#slug]]@" class="hover:text-blue-600 transition-colors @[[item#css_classes]]@">@[[item#label]]@</a>
                <span class="text-gray-300">/</span>
            </li>
            @[[item#children]]@
            <!-- item-parent > -->
            <!-- no-item < -->
            <li class="text-gray-400 italic">Nenhum item no menu</li>
            <!-- no-item > -->
        </ol>
    </nav>
</section>
