<section class="font-sans" data-id="1" data-title="menu-vertical-sidebar">
    <nav class="w-64 bg-gray-50 border-r border-gray-200 min-h-screen p-4">
        <ul class="space-y-1">
            <!-- item < -->
            <li>
                <a href="@[[item#url]]@" target="@[[item#target]]@" data-slug="@[[item#slug]]@" class="block px-3 py-2 rounded text-gray-700 hover:bg-blue-50 hover:text-blue-700 font-medium transition-colors @[[item#css_classes]]@">@[[item#label]]@</a>

            <!-- item > -->
