<section class="font-sans" data-id="1" data-title="menu-horizontal-navbar">
    <style>
        /* Adiciona padding interno e organiza layout de blocos nas subpastas do navbar */
        [data-title="menu-horizontal-navbar"] ul.absolute a {
            display: flex !important;
            align-items: center;
            justify-content: space-between;
            gap: 0.25rem !important;
            padding: 0.5rem 1rem !important; /* px-4 py-2 */
            font-size: 0.875rem !important; /* text-sm */
        }
        [data-title="menu-horizontal-navbar"] ul.absolute a:hover {
            background-color: #f3f4f6 !important; /* hover:bg-gray-100 */
        }
    </style>
    <nav class="bg-white border-b border-gray-200 shadow-sm">
        <div class="max-w-6xl mx-auto px-4">
            <ul class="flex flex-wrap items-center gap-8 h-14">
                <!-- item < -->
                <li>
                    <a href="@[[item#url]]@" target="@[[item#target]]@" data-slug="@[[item#slug]]@" class="text-gray-700 hover:text-blue-600 font-medium transition-colors @[[item#css_classes]]@">@[[item#label]]@</a>
                </li>
                <!-- item > -->
                <!-- item-parent < -->
                <li class="relative group">
                    <a href="@[[item#url]]@" target="@[[item#target]]@" data-slug="@[[item#slug]]@" class="text-gray-700 hover:text-blue-600 font-medium transition-colors inline-flex items-center gap-1 @[[item#css_classes]]@">@[[item#label]]@
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                    </a>
                    <ul class="absolute left-0 top-full w-48 bg-white border border-gray-200 rounded-md shadow-lg py-1 hidden group-hover:block z-20">
                        @[[item#children]]@
                    </ul>
                </li>
                <!-- item-parent > -->
                <!-- item-separator < -->
                <li class="flex items-center gap-2 text-gray-300 select-none">
                    <span aria-hidden="true">|</span>
                    <span class="text-xs font-semibold text-gray-400 uppercase tracking-wide">@[[item#label]]@</span>
                </li>
                <!-- item-separator > -->
                <!-- no-item < -->
                <li class="text-gray-400 italic">No menu items</li>
                <!-- no-item > -->
            </ul>
        </div>
    </nav>
</section>
