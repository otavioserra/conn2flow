<section class="font-sans" data-id="1" data-title="menu-horizontal-navbar">
    <nav class="bg-white border-b border-gray-200 shadow-sm">
        <div class="max-w-6xl mx-auto px-4">
            <ul class="flex flex-wrap items-center gap-6 h-14">
                <!-- item < -->
                <li>
                    <a href="@[[item#url]]@" data-slug="@[[item#slug]]@" class="text-gray-700 hover:text-blue-600 font-medium transition-colors @[[item#css_classes]]@">@[[item#label]]@</a>
                </li>
                <!-- item > -->
                <!-- item-parent < -->
                <li class="relative group">
                    <a href="@[[item#url]]@" data-slug="@[[item#slug]]@" class="text-gray-700 hover:text-blue-600 font-medium transition-colors inline-flex items-center gap-1 @[[item#css_classes]]@">@[[item#label]]@
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                    </a>
                    <ul class="absolute left-0 top-full w-48 bg-white border border-gray-200 rounded-md shadow-lg py-1 hidden group-hover:block z-20">
                        @[[item#children]]@
                    </ul>
                </li>
                <!-- item-parent > -->
                <!-- no-item < -->
                <li class="text-gray-400 italic">No menu items</li>
                <!-- no-item > -->
            </ul>
        </div>
    </nav>
</section>
