<section class="font-sans p-6" data-id="1" data-title="menu-dropdown">
    <nav class="relative inline-block text-left group">
        <button type="button" class="inline-flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-md font-medium hover:bg-blue-700 transition-colors">
            Menu
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </button>
        <ul class="absolute left-0 mt-1 w-56 bg-white border border-gray-200 rounded-md shadow-lg py-1 hidden group-hover:block z-10">
            <!-- item < -->
            <li>
                <a href="@[[item#url]]@" class="block px-4 py-2 text-gray-700 hover:bg-gray-100 transition-colors">@[[item#label]]@</a>
            </li>
            <!-- item > -->
            <!-- item-parent < -->
            <li class="relative group/sub">
                <a href="@[[item#url]]@" class="flex items-center justify-between px-4 py-2 text-gray-700 hover:bg-gray-100 transition-colors">@[[item#label]]@
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                </a>
                <ul class="absolute left-full top-0 ml-1 w-56 bg-white border border-gray-200 rounded-md shadow-lg py-1 hidden group-hover/sub:block z-20">
                    @[[item#children]]@
                </ul>
            </li>
            <!-- item-parent > -->
            <!-- no-item < -->
            <li class="px-4 py-2 text-gray-400 italic">No menu items</li>
            <!-- no-item > -->
        </ul>
    </nav>
</section>
