        <div class="max-w-6xl mx-auto px-4">
            <h3 class="text-white font-semibold mb-4 uppercase tracking-wide text-sm">Navigation</h3>
            <ul class="grid grid-cols-2 md:grid-cols-4 gap-3">
                <!-- item < -->
                <li>
                    <a href="@[[item#url]]@" target="@[[item#target]]@" data-slug="@[[item#slug]]@" class="hover:text-white transition-colors @[[item#css_classes]]@">@[[item#label]]@</a>
                </li>
                <!-- item > -->
                <!-- item-parent < -->
                <li>
                    <a href="@[[item#url]]@" target="@[[item#target]]@" data-slug="@[[item#slug]]@" class="block text-white font-semibold mb-2 hover:text-blue-300 transition-colors @[[item#css_classes]]@">@[[item#label]]@</a>

                <!-- item-separator < -->
                <li class="col-span-full">

                </li>
                <!-- item-separator > -->
                <!-- no-item < -->
                <li class="text-gray-500 italic">No menu items</li>

            </ul>
        </div>
