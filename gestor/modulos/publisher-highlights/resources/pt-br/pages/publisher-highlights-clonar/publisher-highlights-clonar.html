<div class="field">
    <label>Nome do Bloco de Destaques</label>
    <input type="text" name="name" placeholder="Ex: Destaques da Home - Notícias (cópia)">
</div>

<div class="field">
    <label>Publicador de Origem</label>
    <select id="publisher_id" class="ui search clearable dropdown publisherDropdown" name="publisher_id">
        <option value="">#publisher_placeholder_option#</option>
        #publisher_id_options#
    </select>
</div>

<div class="ui info icon message">
    <i class="info circle icon"></i>
    <div class="content">
        <div class="header">Clone fiel do bloco de origem</div>
        <p>O HTML e o CSS do bloco original serão carregados no novo registro. Após salvar, você poderá
            editar livremente sem afetar o bloco original.</p>
    </div>
</div>

<input type="hidden" name="fields_schema">
<input type="hidden" name="html" value="#html-original#">
<input type="hidden" name="css" value="#css-original#">
