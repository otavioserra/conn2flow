<section class="bg-gray-50 py-12 px-4 sm:px-6 lg:px-8 font-sans" data-id="1" data-title="noticias-grid-cards">
    <div class="max-w-7xl mx-auto">
        <h2 class="text-3xl font-extrabold text-gray-900 mb-8 tracking-tight">Destaques</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- item < -->
            <article class="bg-white rounded-xl shadow-sm overflow-hidden border border-gray-100 flex flex-col hover:shadow-md transition-shadow">
                <a href="@[[item#url]]@" class="block">
                    <img src="@[[item#imagem]]@" alt="@[[item#titulo]]@" class="w-full aspect-[16/9] object-cover">
                </a>
                <div class="p-5 flex flex-col flex-1">
                    <span class="inline-flex self-start items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800 uppercase tracking-wide mb-3">@[[item#categoria]]@</span>
                    <h3 class="text-lg font-semibold text-gray-900 leading-snug mb-2">
                        <a href="@[[item#url]]@" class="hover:text-red-700 transition-colors">@[[item#titulo]]@</a>
                    </h3>
                    <p class="text-sm text-gray-600 leading-relaxed mb-4 flex-1">@[[item#resumo]]@</p>
                    <a href="@[[item#url]]@" class="text-sm font-semibold text-red-700 hover:text-red-800 self-start">Leia mais &rarr;</a>
                </div>
            </article>
            <!-- item > -->
        </div>
    </div>
    <!-- no-item < -->
    <div class="py-10 text-center text-gray-400 font-sans">
        <h3 class="text-lg font-semibold">Nenhuma publicação encontrada</h3>
    </div>
    <!-- no-item > -->
</section>
