<section class="bg-white py-10 px-4 sm:px-6 lg:px-8 font-sans" data-id="1" data-title="noticias-lista-simples">
    <div class="max-w-3xl mx-auto">
        <h2 class="text-2xl font-bold text-gray-900 mb-6 tracking-tight">Últimas notícias</h2>
        <ul class="divide-y divide-gray-200">
            <!-- item < -->
            <li class="py-4 flex items-start justify-between gap-6">
                <a href="@[[item#url]]@" class="flex-1 group">
                    <h3 class="text-lg font-semibold text-gray-900 group-hover:text-red-700 transition-colors">@[[item#titulo]]@</h3>
                </a>
                <time class="text-sm text-gray-500 shrink-0 mt-1" datetime="@[[item#data]]@">@[[item#data]]@</time>
            </li>
            <!-- item > -->
        </ul>
    </div>
    <!-- no-item < -->
    <div class="py-10 text-center text-gray-400 font-sans">
        <h3 class="text-lg font-semibold">Nenhuma publicação encontrada</h3>
    </div>
    <!-- no-item > -->
</section>
