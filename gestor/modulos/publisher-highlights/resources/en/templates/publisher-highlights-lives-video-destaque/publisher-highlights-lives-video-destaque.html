<section class="bg-gray-900 text-white py-12 px-4 sm:px-6 lg:px-8 font-sans" data-id="1" data-title="lives-video-destaque">
    <div class="max-w-6xl mx-auto">
        <h2 class="text-3xl font-extrabold mb-8 tracking-tight">Lives em destaque</h2>
        <div class="space-y-8">
            <!-- item < -->
            <article class="grid grid-cols-1 lg:grid-cols-2 gap-8 items-center">
                <a href="@[[item#url]]@" class="block relative group rounded-xl overflow-hidden bg-black">
                    <img src="@[[item#imagem]]@" alt="@[[item#titulo]]@" class="w-full aspect-video object-cover opacity-80 group-hover:opacity-100 transition-opacity">
                    <span class="absolute inset-0 flex items-center justify-center">
                        <span class="w-16 h-16 rounded-full bg-red-600/90 flex items-center justify-center group-hover:bg-red-500 transition-colors">
                            <svg class="w-7 h-7 text-white ml-1" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                        </span>
                    </span>
                </a>
                <div>
                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-600 text-white uppercase tracking-wide mb-3">@[[item#status]]@</span>
                    <h3 class="text-2xl font-bold leading-tight mb-3">
                        <a href="@[[item#url]]@" class="hover:text-red-300 transition-colors">@[[item#titulo]]@</a>
                    </h3>
                    <p class="text-base text-gray-300 leading-relaxed mb-4">@[[item#resumo]]@</p>
                    <time class="text-sm text-gray-400" datetime="@[[item#data]]@">@[[item#data]]@</time>
                </div>
            </article>
            <!-- item > -->
        </div>
    </div>
    <!-- no-item < -->
    <div class="py-10 text-center text-gray-400 font-sans">
        <h3 class="text-lg font-semibold">No publications found</h3>
    </div>
    <!-- no-item > -->
</section>
