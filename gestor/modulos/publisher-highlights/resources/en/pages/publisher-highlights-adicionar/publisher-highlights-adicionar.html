<div class="field">
    <label>Nome do Bloco de Destaques</label>
    <input type="text" name="name" placeholder="Ex: Destaques da Home - Notícias">
</div>

<div class="field">
    <label><span>Publicador de Origem</span>
        <div class="ui label">
            <i class="bookmark outline icon"></i>
            Escolha qual publicação alimentará este bloco de destaques (ex: Notícias, Artigos, Lives, Notas).
            Após criar, você poderá selecionar o modelo visual e configurar regras de curadoria.
        </div>
    </label>
    <select id="publisher_id" class="ui search clearable dropdown publisherDropdown" name="publisher_id">
        <option value="">#publisher_placeholder_option#</option>
        #publisher_id_options#
    </select>
</div>

<div class="ui info icon message">
    <i class="info circle icon"></i>
    <div class="content">
        <div class="header">Próximos passos</div>
        <p>Após salvar, você será direcionado para a tela de edição onde poderá: escolher um <b>modelo visual de destaque</b>,
            configurar a <b>regra de alimentação</b> (manual ou últimas publicações), <b>mapear os campos</b>
            <code>@[[item#...]]@</code> do template para os campos do publicador, e editar o <b>HTML/CSS</b> do bloco.</p>
    </div>
</div>
