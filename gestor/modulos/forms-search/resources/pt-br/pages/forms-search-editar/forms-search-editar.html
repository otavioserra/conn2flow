<input type="hidden" name="fields_schema">

<div class="forms-search-main-tabs">
<div class="ui top attached tabular menu menuForms">
    <a class="active item" data-tab="forms-search-general"><i class="settings icon"></i> Geral</a>
    <a class="item" data-tab="forms-search-email"><i class="mail icon"></i> E-mail</a>
    <a class="item" data-tab="forms-search-redirects"><i class="share icon"></i> Redirects</a>
    <a class="item" data-tab="forms-search-fields"><i class="list icon"></i> Campos</a>
</div>

<div class="ui bottom attached active tab segment" data-tab="forms-search-general">
    <div class="field">
        <label>Nome</label>
        <input type="text" name="name" placeholder="Ex: Nome do Formulário" value="#name#">
    </div>
    <div class="field">
        <label>Descrição</label>
        <input type="text" name="description" placeholder="Ex: Descrição do Formulário" value="#description#">
    </div>
    <div class="field">
        <label>#form-module-label#</label>
        <span>#select-module#</span>
    </div>
    <div class="field">
        <label>Ação</label>
        <input type="text" id="form_action" placeholder="pages-index/">
    </div>
    <div class="three fields">
        <div class="field"><label>Limite simples</label><input type="number" id="access_max_simple" min="0"></div>
        <div class="field"><label>Limite total</label><input type="number" id="access_max" min="0"></div>
        <div class="field"><label>reCAPTCHA</label><div class="ui toggle checkbox"><input type="checkbox" id="force_recaptcha"><label>Obrigatório</label></div></div>
    </div>
</div>

<div class="ui bottom attached tab segment" data-tab="forms-search-email">
    <div class="field"><label>Destinatários</label><input type="text" id="email_recipients"></div>
    <div class="two fields">
        <div class="field"><label>Reply-To</label><input type="email" id="email_reply_to"></div>
        <div class="field"><label>Nome do remetente</label><input type="text" id="email_reply_to_name"></div>
    </div>
    <div class="two fields">
        <div class="field"><label>Assunto</label><input type="text" id="email_subject"></div>
        <div class="field"><label>Componente de mensagem</label><div class="sig-autocomplete" data-target="componentes" style="position:relative;"><div class="ui action input"><input type="text" class="sig-search-input" autocomplete="off"><button type="button" class="ui icon button sig-clear"><i class="times icon"></i></button></div><input type="hidden" id="email_message_component" class="sig-hidden-value" value=""><div class="sig-results ui segment" style="display:none;position:absolute;z-index:10;width:100%;max-height:220px;overflow:auto;padding:0;margin-top:2px;"></div></div></div>
    </div>
</div>

<div class="ui bottom attached tab segment" data-tab="forms-search-redirects">
    <div class="two fields">
        <div class="field"><label>Sucesso</label><input type="text" id="redirect_success_path"></div>
        <div class="field"><label>Erro</label><input type="text" id="redirect_error_path"></div>
    </div>
</div>

<div class="ui bottom attached tab segment" data-tab="forms-search-fields">
    <button type="button" class="ui primary button" id="btn-add-form-field"><i class="plus icon"></i> Campo</button>
    <table class="ui celled compact table" id="forms-search-fields-table">
        <thead>
            <tr>
                <th style="width:40px;"></th><th>Rótulo</th><th>Nome</th><th>Tipo</th><th>Placeholder</th><th>Opções</th><th style="width:90px;">Obrigatório</th><th style="width:60px;"></th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>
</div>

<h4 class="ui dividing header">Conteúdo do Formulário</h4>

<div class="field">
    <label>Modelo</label>
    <select id="template_id" class="ui search clearable dropdown templateDropdown" name="template_id">
        <option value="">#template_placeholder_option#</option>
        #template_id_options#
    </select>
</div>

<div class="forms-search-content-tabs">
<div class="ui top attached tabular menu menuConteudoForm">
    <a class="active item" data-tab="forms-search-preview"><i class="eye icon"></i> Pré-Visualização</a>
    <a class="item" data-tab="forms-search-editor"><i class="code icon"></i> Editor HTML</a>
    <a class="item" data-tab="forms-search-widget"><i class="cubes icon"></i> Código do Widget</a>
</div>
<div class="ui bottom attached active tab segment" data-tab="forms-search-preview">
    <div style="position:relative;">
        <iframe id="iframe-forms-search-preview" style="width:100%;height:700px;border:1px solid #ccc;"></iframe>
        <div class="ui dimmer forms-search-preview-dimmer"><div class="ui loader"></div></div>
    </div>
</div>
<div class="ui bottom attached tab segment" data-tab="forms-search-editor">
    #html-editor#
</div>
<div class="ui bottom attached tab segment" data-tab="forms-search-widget">
    <div class="field">
        <label>Variável do Widget</label>
        <div class="ui action input">
            <input type="text" id="forms-search-widget-val" readonly>
            <button type="button" id="btn-copy-forms-search-widget-val" class="ui teal button"><i class="copy icon"></i> Copiar</button>
        </div>
    </div>
    <h4 class="ui header">Código HTML</h4>
    <div style="border:1px solid #ccc;"><textarea id="forms-search-widget-code"></textarea></div>
</div>
</div>
