<form class="mx-auto w-full max-w-2xl" data-form-id="@[[form_id]]@" action="@[[form_action]]@" method="get">
    <div class="relative border-b-2 border-slate-900">
        <div class="flex items-center gap-3">
            <svg aria-hidden="true" viewBox="0 0 24 24" class="h-6 w-6 shrink-0 text-slate-500" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.5-3.5"></path></svg>
            <!-- input-search < -->
            <input class="min-w-0 flex-1 border-0 bg-transparent py-3 text-lg text-slate-950 outline-none placeholder:text-slate-400" type="search" placeholder="Pesquisar no site">
            <!-- input-search > -->
            <button class="px-2 py-3 text-sm font-bold uppercase tracking-wider text-slate-700 hover:text-black" type="submit">Ir</button>
        </div>
        <!-- results-box < -->
        <div class="forms-search-results absolute left-0 right-0 top-full z-50 mt-2 hidden max-h-96 overflow-y-auto border border-slate-200 bg-white shadow-lg"></div>
        <!-- results-box > -->
    </div>
    <!-- item < -->
    <div class="mt-5 border-b border-slate-200 pb-2">
        <label class="mb-1 block text-xs font-bold uppercase tracking-wider text-slate-500" for="@[[form_id]]@-@[[item#name]]@">@[[item#label]]@</label>
        <!-- type-input < --><input class="w-full border-0 bg-transparent py-1 text-slate-900 outline-none" type="@[[item#type]]@" id="@[[form_id]]@-@[[item#name]]@" name="@[[item#name]]@" placeholder="@[[item#placeholder]]@" @[[item#required]]@><!-- type-input > -->
        <!-- type-textarea < --><textarea class="min-h-20 w-full border-0 bg-transparent py-1 text-slate-900 outline-none" id="@[[form_id]]@-@[[item#name]]@" name="@[[item#name]]@" placeholder="@[[item#placeholder]]@" @[[item#required]]@></textarea><!-- type-textarea > -->
        <!-- type-select < --><select class="w-full border-0 bg-transparent py-1 text-slate-900 outline-none" id="@[[form_id]]@-@[[item#name]]@" name="@[[item#name]]@" @[[item#required]]@>@[[item#options]]@</select><!-- type-select > -->
        <!-- type-radio < --><div class="flex flex-wrap gap-3">@[[item#options]]@</div><!-- type-radio > -->
        <!-- type-checkbox < --><div class="flex flex-wrap gap-3">@[[item#options]]@</div><!-- type-checkbox > -->
    </div>
    <!-- item > -->
</form>
