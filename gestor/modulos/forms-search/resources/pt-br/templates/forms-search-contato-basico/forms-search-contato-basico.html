<form class="mx-auto w-full max-w-3xl" data-form-id="@[[form_id]]@" action="@[[form_action]]@" method="get">
    <div class="relative">
        <div class="flex overflow-hidden rounded-xl border border-slate-300 bg-white shadow-sm focus-within:border-blue-500 focus-within:ring-4 focus-within:ring-blue-100">
            <span class="flex items-center pl-4 text-slate-400"><svg aria-hidden="true" viewBox="0 0 24 24" class="h-5 w-5 fill-none stroke-current" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.5-3.5"></path></svg></span>
            <!-- input-search < -->
            <input class="min-w-0 flex-1 border-0 bg-transparent px-3 py-3.5 text-slate-900 outline-none" type="search" placeholder="O que você procura?">
            <!-- input-search > -->
            <button class="bg-blue-600 px-6 font-semibold text-white transition hover:bg-blue-700" type="submit" aria-label="Buscar">Buscar</button>
        </div>
        <!-- results-box < -->
        <div class="forms-search-results absolute left-0 right-0 top-full z-50 mt-2 hidden max-h-96 overflow-y-auto rounded-xl border border-slate-200 bg-white shadow-xl"></div>
        <!-- results-box > -->
    </div>
    <!-- item < -->
    <div class="mt-4">
        <label class="mb-1 block text-sm font-semibold text-slate-700" for="@[[form_id]]@-@[[item#name]]@">@[[item#label]]@</label>
        <!-- type-input < --><input class="w-full rounded-lg border border-slate-300 px-3 py-2" type="@[[item#type]]@" id="@[[form_id]]@-@[[item#name]]@" name="@[[item#name]]@" placeholder="@[[item#placeholder]]@" @[[item#required]]@><!-- type-input > -->
        <!-- type-textarea < --><textarea class="min-h-24 w-full rounded-lg border border-slate-300 px-3 py-2" id="@[[form_id]]@-@[[item#name]]@" name="@[[item#name]]@" placeholder="@[[item#placeholder]]@" @[[item#required]]@></textarea><!-- type-textarea > -->
        <!-- type-select < --><select class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2" id="@[[form_id]]@-@[[item#name]]@" name="@[[item#name]]@" @[[item#required]]@>@[[item#options]]@</select><!-- type-select > -->
        <!-- type-radio < --><div class="flex flex-wrap gap-3">@[[item#options]]@</div><!-- type-radio > -->
        <!-- type-checkbox < --><div class="flex flex-wrap gap-3">@[[item#options]]@</div><!-- type-checkbox > -->
    </div>
    <!-- item > -->
</form>
