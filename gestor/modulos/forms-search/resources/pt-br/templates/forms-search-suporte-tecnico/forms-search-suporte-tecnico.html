<form class="mx-auto w-full max-w-3xl rounded-xl bg-slate-950 p-5 text-white shadow-2xl" data-form-id="@[[form_id]]@" action="@[[form_action]]@" method="get">
    <div class="relative">
        <div class="flex items-center gap-3 rounded-lg border border-slate-700 bg-slate-900 px-3 focus-within:border-cyan-400">
            <svg aria-hidden="true" viewBox="0 0 24 24" class="h-5 w-5 shrink-0 text-cyan-400" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.5-3.5"></path></svg>
            <!-- input-search < -->
            <input class="min-w-0 flex-1 border-0 bg-transparent py-3 text-white outline-none placeholder:text-slate-500" type="search" placeholder="Pesquisar documentação, páginas e recursos">
            <!-- input-search > -->
            <button class="rounded-md bg-cyan-400 px-4 py-2 text-sm font-bold text-slate-950 hover:bg-cyan-300" type="submit">Buscar</button>
        </div>
        <!-- results-box < -->
        <div class="forms-search-results absolute left-0 right-0 top-full z-50 mt-2 hidden max-h-96 overflow-y-auto rounded-lg border border-slate-700 bg-slate-900 text-white shadow-2xl"></div>
        <!-- results-box > -->
    </div>
    <!-- item < -->
    <div class="mt-4">
        <label class="mb-1 block text-xs font-bold uppercase tracking-wider text-cyan-300" for="@[[form_id]]@-@[[item#name]]@">@[[item#label]]@</label>
        <!-- type-input < --><input class="w-full rounded-md border border-slate-700 bg-slate-900 px-3 py-2 text-white" type="@[[item#type]]@" id="@[[form_id]]@-@[[item#name]]@" name="@[[item#name]]@" placeholder="@[[item#placeholder]]@" @[[item#required]]@><!-- type-input > -->
        <!-- type-textarea < --><textarea class="min-h-24 w-full rounded-md border border-slate-700 bg-slate-900 px-3 py-2 text-white" id="@[[form_id]]@-@[[item#name]]@" name="@[[item#name]]@" placeholder="@[[item#placeholder]]@" @[[item#required]]@></textarea><!-- type-textarea > -->
        <!-- type-select < --><select class="w-full rounded-md border border-slate-700 bg-slate-900 px-3 py-2 text-white" id="@[[form_id]]@-@[[item#name]]@" name="@[[item#name]]@" @[[item#required]]@>@[[item#options]]@</select><!-- type-select > -->
        <!-- type-radio < --><div class="flex flex-wrap gap-3 text-white">@[[item#options]]@</div><!-- type-radio > -->
        <!-- type-checkbox < --><div class="flex flex-wrap gap-3 text-white">@[[item#options]]@</div><!-- type-checkbox > -->
    </div>
    <!-- item > -->
</form>
