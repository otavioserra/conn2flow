<input type="hidden" name="fields_schema">

<div class="forms-search-main-tabs">
<div class="ui top attached tabular menu menuForms">
    <a class="active item" data-tab="forms-search-general"><i class="settings icon"></i> General</a>
    <a class="item" data-tab="forms-search-fields"><i class="list icon"></i> Extra Fields</a>
</div>

<div class="ui bottom attached active tab segment" data-tab="forms-search-general">
    <div class="field"><label>Name</label><input type="text" name="name" placeholder="Ex: Form Name"></div>
    <div class="field"><label>Description</label><input type="text" name="description" placeholder="Ex: Form Description" value="#description#"></div>
    <div class="field"><label>#form-module-label#</label><span>#select-module#</span></div>
    <div class="field"><label>Action</label><input type="text" id="form_action" placeholder="pages-index-search/"></div>
</div>

<div class="ui bottom attached tab segment" data-tab="forms-search-fields">
    <div class="ui info message">The required <code>search</code> field is included automatically. Add only optional filters here.</div>
    <button type="button" class="ui primary button" id="btn-add-form-field"><i class="plus icon"></i> Field</button>
    <table class="ui celled compact table" id="forms-search-fields-table">
        <thead><tr><th style="width:40px;"></th><th>Label</th><th>Name</th><th>Type</th><th>Placeholder</th><th>Options</th><th style="width:90px;">Required</th><th style="width:60px;"></th></tr></thead>
        <tbody></tbody>
    </table>
</div>
</div>

<h4 class="ui dividing header">Form Content</h4>

<div class="field"><label>Template</label><select id="template_id" class="ui search clearable dropdown templateDropdown" name="template_id"><option value="">#template_placeholder_option#</option>#template_id_options#</select></div>

<div class="forms-search-content-tabs">
<div class="ui top attached tabular menu menuConteudoForm"><a class="active item" data-tab="forms-search-preview"><i class="eye icon"></i> Preview</a><a class="item" data-tab="forms-search-editor"><i class="code icon"></i> HTML Editor</a><a class="item" data-tab="forms-search-widget"><i class="cubes icon"></i> Widget Code</a></div>
<div class="ui bottom attached active tab segment" data-tab="forms-search-preview"><div style="position:relative;"><iframe id="iframe-forms-search-preview" style="width:100%;height:700px;border:1px solid #ccc;"></iframe><div class="ui dimmer forms-search-preview-dimmer"><div class="ui loader"></div></div></div></div>
<div class="ui bottom attached tab segment" data-tab="forms-search-editor">
    #html-editor#
</div>
<div class="ui bottom attached tab segment" data-tab="forms-search-widget"><div class="field"><label>Widget Variable</label><div class="ui action input"><input type="text" id="forms-search-widget-val" readonly><button type="button" id="btn-copy-forms-search-widget-val" class="ui teal button"><i class="copy icon"></i> Copy</button></div></div><h4 class="ui header">HTML Code</h4><div style="border:1px solid #ccc;"><textarea id="forms-search-widget-code"></textarea></div></div>
</div>
