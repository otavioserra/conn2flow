<form class="w-full max-w-xl" data-form-id="@[[form_id]]@" action="@[[form_action]]@" method="get">
    <div class="relative">
        <div class="flex items-center rounded-full border border-slate-200 bg-slate-50 p-1 shadow-inner focus-within:border-emerald-500">
            <span class="pl-3 text-emerald-600"><svg aria-hidden="true" viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.5-3.5"></path></svg></span>
            <!-- input-search < -->
            <input class="min-w-0 flex-1 border-0 bg-transparent px-3 py-2 text-sm text-slate-900 outline-none" type="search" placeholder="Search">
            <!-- input-search > -->
            <button class="rounded-full bg-emerald-600 p-2.5 text-white hover:bg-emerald-700" type="submit" aria-label="Search"><svg aria-hidden="true" viewBox="0 0 24 24" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2"><path d="m5 12 4 4L19 6"></path></svg></button>
        </div>
        <!-- results-box < -->
        <div class="forms-search-results absolute left-0 right-0 top-full z-50 mt-2 hidden max-h-80 overflow-y-auto rounded-2xl border border-slate-200 bg-white shadow-xl"></div>
        <!-- results-box > -->
    </div>
    <!-- item < -->
    <div class="mt-3">
        <label class="mb-1 block text-xs font-semibold text-slate-600" for="@[[form_id]]@-@[[item#name]]@">@[[item#label]]@</label>
        <!-- type-input < --><input class="w-full rounded-full border border-slate-200 bg-slate-50 px-4 py-2 text-sm" type="@[[item#type]]@" id="@[[form_id]]@-@[[item#name]]@" name="@[[item#name]]@" placeholder="@[[item#placeholder]]@" @[[item#required]]@><!-- type-input > -->
        <!-- type-textarea < --><textarea class="min-h-20 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-2 text-sm" id="@[[form_id]]@-@[[item#name]]@" name="@[[item#name]]@" placeholder="@[[item#placeholder]]@" @[[item#required]]@></textarea><!-- type-textarea > -->
        <!-- type-select < --><select class="w-full rounded-full border border-slate-200 bg-slate-50 px-4 py-2 text-sm" id="@[[form_id]]@-@[[item#name]]@" name="@[[item#name]]@" @[[item#required]]@>@[[item#options]]@</select><!-- type-select > -->
        <!-- type-radio < --><div class="flex flex-wrap gap-2">@[[item#options]]@</div><!-- type-radio > -->
        <!-- type-checkbox < --><div class="flex flex-wrap gap-2">@[[item#options]]@</div><!-- type-checkbox > -->
    </div>
    <!-- item > -->
</form>
