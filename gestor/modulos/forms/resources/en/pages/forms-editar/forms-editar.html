<input type="hidden" name="fields_schema">

<div class="ui top attached tabular menu menuForms">
    <a class="active item" data-tab="forms-general"><i class="settings icon"></i> General</a>
    <a class="item" data-tab="forms-email"><i class="mail icon"></i> E-mail</a>
    <a class="item" data-tab="forms-redirects"><i class="share icon"></i> Redirects</a>
    <a class="item" data-tab="forms-fields"><i class="list icon"></i> Fields</a>
    <a class="item" data-tab="forms-template"><i class="code icon"></i> Template</a>
</div>

<div class="ui bottom attached active tab segment" data-tab="forms-general">
    <div class="field"><label>Name</label><input type="text" name="name" placeholder="Ex: Form Name" value="#name#"></div>
    <div class="field"><label>Description</label><input type="text" name="description" placeholder="Ex: Form Description" value="#description#"></div>
    <div class="field"><label>#form-module-label#</label><span>#select-module#</span></div>
    <div class="field"><label>Action</label><input type="text" id="form_action" placeholder="/api/forms/submit"></div>
    <div class="three fields"><div class="field"><label>Simple limit</label><input type="number" id="access_max_simple" min="0"></div><div class="field"><label>Total limit</label><input type="number" id="access_max" min="0"></div><div class="field"><label>reCAPTCHA</label><div class="ui toggle checkbox"><input type="checkbox" id="force_recaptcha"><label>Required</label></div></div></div>
</div>

<div class="ui bottom attached tab segment" data-tab="forms-email">
    <div class="field"><label>Recipients</label><input type="text" id="email_recipients"></div>
    <div class="two fields"><div class="field"><label>Reply-To</label><input type="email" id="email_reply_to"></div><div class="field"><label>Sender name</label><input type="text" id="email_reply_to_name"></div></div>
    <div class="two fields"><div class="field"><label>Subject</label><input type="text" id="email_subject"></div><div class="field"><label>Message component</label><input type="text" id="email_message_component"></div></div>
</div>

<div class="ui bottom attached tab segment" data-tab="forms-redirects">
    <div class="two fields"><div class="field"><label>Success</label><input type="text" id="redirect_success_path"></div><div class="field"><label>Error</label><input type="text" id="redirect_error_path"></div></div>
</div>

<div class="ui bottom attached tab segment" data-tab="forms-fields">
    <button type="button" class="ui primary button" id="btn-add-form-field"><i class="plus icon"></i> Field</button>
    <table class="ui celled compact table" id="forms-fields-table">
        <thead><tr><th style="width:40px;"></th><th>Label</th><th>Name</th><th>Type</th><th>Placeholder</th><th>Options</th><th style="width:90px;">Required</th><th style="width:60px;"></th></tr></thead>
        <tbody></tbody>
    </table>
</div>

<div class="ui bottom attached tab segment" data-tab="forms-template">
    <div class="field"><label>Template</label><select id="template_id" class="ui search clearable dropdown templateDropdown" name="template_id"><option value="">#template_placeholder_option#</option>#template_id_options#</select></div>
    <div class="ui top attached tabular menu menuFormsTemplate"><a class="active item" data-tab="forms-preview"><i class="eye icon"></i> Preview</a><a class="item" data-tab="forms-editor"><i class="code icon"></i> HTML Editor</a><a class="item" data-tab="forms-widget"><i class="cubes icon"></i> Widget</a></div>
    <div class="ui bottom attached active tab segment" data-tab="forms-preview"><div style="position:relative;"><iframe id="iframe-forms-preview" style="width:100%;height:700px;border:1px solid #ccc;"></iframe><div class="ui dimmer forms-preview-dimmer"><div class="ui loader"></div></div></div></div>
    <div class="ui bottom attached tab segment" data-tab="forms-editor">#html-editor#</div>
    <div class="ui bottom attached tab segment" data-tab="forms-widget"><div class="field"><label>Widget Variable</label><div class="ui action input"><input type="text" id="forms-widget-val" readonly><button type="button" id="btn-copy-forms-widget-val" class="ui teal button"><i class="copy icon"></i> Copy</button></div></div><h4 class="ui header">HTML Code</h4><div style="border:1px solid #ccc;"><textarea id="forms-widget-code"></textarea></div></div>
</div>
