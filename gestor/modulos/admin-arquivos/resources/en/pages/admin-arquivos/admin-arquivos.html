<h1 class="ui header">@[[pagina#titulo]]@</h1>

<div id="c2f-files-app" class="c2f-files-app">

    <div class="ui stackable grid c2f-toolbar">
        <div class="ten wide middle aligned column">
            <div class="ui breadcrumb c2f-breadcrumb" id="c2f-breadcrumb"></div>
        </div>
        <div class="six wide right aligned middle aligned column">
            <div class="ui icon buttons c2f-views">
                <button class="ui button c2f-view-btn" data-view="large" data-content="@[[view-large]]@"><i
                        class="th large icon"></i></button>
                <button class="ui button c2f-view-btn" data-view="medium" data-content="@[[view-medium]]@"><i
                        class="th icon"></i></button>
                <button class="ui button c2f-view-btn" data-view="small" data-content="@[[view-small]]@"><i
                        class="grid layout icon"></i></button>
                <button class="ui button c2f-view-btn" data-view="list" data-content="@[[view-list]]@"><i
                        class="list icon"></i></button>
            </div>
        </div>
    </div>

    <div class="ui fluid icon input c2f-search-box">
        <input type="text" id="c2f-search" placeholder="@[[search-files-placeholder]]@" autocomplete="off">
        <i class="search icon c2f-search-icon"></i>
        <i class="times circle link icon c2f-search-clear hidden"></i>
    </div>

    <!-- normal-tools < -->
    <div class="ui basic segment c2f-folder-tools">
        <a class="ui button positive" href="@[[pagina#url-raiz]]@@[[pagina#modulo-id]]@/adicionar/#paginaIframe#"
            data-id="adicionar">
            <i class="upload icon"></i> @[[add-button-label]]@
        </a>
        <button class="ui button" id="c2f-new-folder"><i class="folder plus icon"></i> @[[folder-new]]@</button>
        <div class="ui right floated checkbox c2f-select-all-box">
            <input type="checkbox" id="c2f-select-all"><label>@[[select-all]]@</label>
        </div>
    </div>
    <!-- normal-tools > -->

    <div class="ui yellow message hidden c2f-selection-bar" id="c2f-selection-bar">
        <span><b id="c2f-selection-count">0</b> @[[selected-count-label]]@</span>
        <button class="ui right floated mini red button" id="c2f-delete-selected"><i class="trash icon"></i>
            @[[delete-selected]]@</button>
    </div>

    <div class="ui styled fluid accordion c2f-filter-accordion">
        <div class="title"><i class="dropdown icon"></i> @[[filter-label]]@</div>
        <div class="content">
            <div class="ui teal message">@[[filter-info]]@</div>
            <div class="ui stackable grid">
                <div class="eight wide column">
                    <div class="ui medium header">@[[date-label]]@</div>
                    <div class="ui form">
                        <div class="two fields">
                            <div class="field">
                                <div class="ui calendar inverted" id="rangestart">
                                    <div class="ui input left icon">
                                        <i class="calendar icon"></i>
                                        <input type="text" placeholder="@[[date-start-label]]@">
                                    </div>
                                </div>
                            </div>
                            <div class="field">
                                <div class="ui calendar inverted" id="rangeend">
                                    <div class="ui input left icon">
                                        <i class="calendar icon"></i>
                                        <input type="text" placeholder="@[[date-end-label]]@">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="four wide column">
                    <div class="ui medium header">@[[categories-label]]@</div>
                    <span>#select-categories#</span>
                </div>
                <div class="four wide column">
                    <div class="ui medium header">@[[order-label]]@</div>
                    <span>#select-order#</span>
                </div>
                <div class="sixteen wide column">
                    <button class="ui positive button" id="c2f-filter">@[[filter-button]]@</button>
                    <button class="ui button" id="c2f-clear">@[[clear-button]]@</button>
                </div>
            </div>
        </div>
    </div>

    <div class="ui small info message hidden c2f-thumbs-bar" id="c2f-thumbs-bar">
        <i class="notched circle loading icon"></i> @[[thumbs-processing]]@
    </div>

    <div class="c2f-files-list" id="c2f-files-list"></div>

    <div class="hidden" id="c2f-empty">#without-results-cont#</div>

    <div class="ui basic center aligned segment hidden" id="c2f-more">
        <button class="ui blue button">@[[more-results-button]]@</button>
    </div>

</div>
