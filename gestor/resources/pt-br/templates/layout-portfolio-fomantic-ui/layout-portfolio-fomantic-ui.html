<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <!-- pagina#titulo -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- pagina#css -->
    <!-- pagina#js -->
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: #f9fafb;
        }

        .main-content {
            flex: 1;
        }

        .site-footer {
            margin-top: auto;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <div class="ui borderless menu"
        style="margin-bottom: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #e5e7eb;">
        <div class="ui container">
            <a href="/" class="header item" style="font-weight: bold; font-size: 1.2em;">
                🎨 Portfólio
            </a>
            <a href="#" class="item">Trabalhos</a>
            <a href="#" class="item">Sobre</a>
            <a href="#" class="item">Blog</a>
            <div class="right menu">
                <div class="item">
                    <a href="#" class="ui black circular button">Contato</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        @[[pagina#corpo]]@
    </div>

    <!-- Footer -->
    <div class="ui vertical segment site-footer" style="padding: 3em 0; border-top: 1px solid #e5e7eb;">
        <div class="ui container">
            <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap;">
                <p style="color: #999; font-size: 0.9em; margin: 0;">&copy; 2025 Meu Portfólio. Feito com ❤️</p>
                <div>
                    <a href="#" style="color: #999; margin-left: 1em;">
                        <i class="github icon large"></i>
                    </a>
                    <a href="#" style="color: #999; margin-left: 1em;">
                        <i class="linkedin icon large"></i>
                    </a>
                    <a href="#" style="color: #999; margin-left: 1em;">
                        <i class="twitter icon large"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- pagina#js -->
</body>

</html>
