<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <!-- pagina#titulo -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- pagina#css -->
    <!-- pagina#js -->
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
        }

        .site-footer {
            margin-top: auto;
        }
    </style>
</head>

<body>

    <!-- Minimal Header -->
    <div class="ui inverted segment"
        style="margin: 0; border-radius: 0; padding: 1em 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
        <div class="ui container">
            <div style="display: flex; align-items: center; justify-content: space-between;">
                <a href="/" style="color: white; font-size: 1.5em; font-weight: bold; text-decoration: none;">Minha
                    Marca</a>
                <a href="#cta" class="ui white button">Começar Agora</a>
            </div>
        </div>
    </div>

    <!-- Main Content Full Width -->
    <div class="main-content">
        @[[pagina#corpo]]@
    </div>

    <!-- Minimal Footer -->
    <div class="ui inverted vertical footer segment site-footer" style="padding: 1.5em 0;">
        <div class="ui container">
            <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap;">
                <p style="color: rgba(255,255,255,0.5); font-size: 0.9em; margin: 0;">
                    &copy; 2025 Minha Marca. Todos os direitos reservados.
                </p>
                <div>
                    <a href="#" style="color: rgba(255,255,255,0.5); margin-left: 1.5em; font-size: 0.9em;">Termos</a>
                    <a href="#"
                        style="color: rgba(255,255,255,0.5); margin-left: 1.5em; font-size: 0.9em;">Privacidade</a>
                </div>
            </div>
        </div>
    </div>

    <!-- pagina#js -->
</body>

</html>
