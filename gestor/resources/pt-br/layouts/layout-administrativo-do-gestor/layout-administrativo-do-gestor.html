<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <!-- pagina#titulo -->
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="apple-touch-icon" sizes="180x180" href="@[[pagina#url-raiz]]@favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="@[[pagina#url-raiz]]@favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="@[[pagina#url-raiz]]@favicon/favicon-16x16.png">
    <link rel="manifest" href="@[[pagina#url-raiz]]@favicon/site.webmanifest">
    <!-- pagina#css -->
    <!-- pagina#js -->
</head>

<body class="gestor-photon-admin">
    <button id="menu-toggle-btn" class="ui icon button photon-menu-toggle" type="button" data-tooltip="Abrir menu"
        data-position="right center" data-inverted="">
        <i class="bars icon"></i>
    </button>

    <div class="menu-mobile-overlay"></div>

    <header class="photon-mobile-topbar">
        <a class="photon-mobile-brand" href="@[[pagina#url-raiz]]@dashboard/">
            <img src="@[[pagina#url-raiz]]@images/logo-principal.png?v=1" alt="Conn2Flow">
        </a>
        <div class="photon-mobile-user">
            <i class="user circle icon"></i>
            <span>@[[usuario#nome]]@</span>
        </div>
    </header>

    <div class="pusher layoutPusher photon-admin-shell">
        <aside class="menuComputerCont photon-admin-sidebar">
            <div class="photon-admin-brand">
                <a href="@[[pagina#url-raiz]]@dashboard/">
                    <img id="conn2flow-logo-principal" src="@[[pagina#url-raiz]]@images/logo-principal.png?v=1"
                        alt="Conn2Flow">
                    <span class="photon-admin-brand-badge">Academico ou Gestor</span>
                </a>
            </div>

            <div class="photon-admin-sidebar-divider"></div>

            <div class="menu-controls">
                <span class="photon-admin-nav-section-header">Principal</span>
                <div class="ui icon buttons">
                    <button id="menu-dashboard3d-btn" class="ui button" type="button" data-tooltip="Dashboard 3D"
                        data-position="bottom left" data-inverted="">
                        <i class="cube icon"></i>
                    </button>
                    <button id="menu-close-btn" class="ui button" type="button" data-tooltip="Fechar menu"
                        data-position="bottom left" data-inverted="">
                        <i class="times icon"></i>
                    </button>
                </div>
            </div>

            <nav class="photon-admin-nav">
                @[[pagina#menu]]@
            </nav>

            <div class="gestorVersao photon-admin-profile">
                <div class="photon-admin-avatar">
                    <i class="user icon"></i>
                    <span class="photon-admin-avatar-indicator" aria-hidden="true"></span>
                </div>
                <div class="photon-admin-profile-copy">
                    <div class="photon-admin-profile-name">@[[usuario#nome]]@</div>
                    <div class="photon-admin-profile-status">Usuario ativo</div>
                    <div class="photon-admin-profile-version">Gestor v@[[gestor#versao]]@</div>
                </div>
            </div>

            <div id="menu-resize-handle" data-tooltip="Arrastar para redimensionar" data-position="right center"
                data-inverted="">
                <i class="grip lines vertical large icon"></i>
            </div>
        </aside>

        <main class="paginaCont photon-admin-main">
            <div class="ui main container photon-admin-content">
                @[[pagina#corpo]]@
            </div>

            <footer class="photon-admin-footer">
                <div class="photon-admin-footer-inner">
                    <div class="photon-admin-footer-brand">
                        <img src="@[[pagina#url-raiz]]@images/logo-principal.png?v=1" alt="Conn2Flow">
                        <span>Gestor v@[[gestor#versao]]@</span>
                    </div>
                    <span>Powered by Conn2Flow</span>
                </div>
            </footer>
        </main>
    </div>

    <div id="gestor-listener"></div>
    <div class="ui dimmer paginaCarregando">
        <div class="ui huge text loader">Carregando</div>
    </div>
</body>

</html>
